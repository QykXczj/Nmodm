name: 创建发行版

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发行版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean
      draft:
        description: '是否为草稿版本'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 创建必要目录
      run: |
        New-Item -ItemType Directory -Force -Path "OnlineFix"
        New-Item -ItemType Directory -Force -Path "Mods"
        "OnlineFix64.dll" | Out-File -FilePath "OnlineFix/dlllist.txt" -Encoding UTF8

    - name: 使用 Nuitka 打包 (目录版)
      run: |
        # 创建简化的构建脚本避免编码问题
        python -c "
        import sys
        import os
        import subprocess
        import shutil
        from pathlib import Path

        # 设置环境变量避免编码问题
        os.environ['PYTHONIOENCODING'] = 'utf-8'

        # 简化的 Nuitka 构建
        project_root = Path('.')
        builds_dir = project_root / 'Builds'
        dist_dir = builds_dir / 'Nuitka'

        # 确保目录存在
        builds_dir.mkdir(exist_ok=True)
        dist_dir.mkdir(exist_ok=True)

        # 清理旧文件
        if dist_dir.exists():
            shutil.rmtree(dist_dir)
            dist_dir.mkdir(exist_ok=True)

        # Nuitka 命令
        cmd = [
            sys.executable, '-m', 'nuitka',
            '--assume-yes-for-downloads',
            '--enable-plugin=pyside6',
            '--disable-console',
            '--standalone',
            '--output-dir=' + str(dist_dir),
            '--output-filename=Nmodm_nuitka_standalone',
            '--include-data-file=zwnr.png=zwnr.png',
            '--include-data-dir=OnlineFix=OnlineFix',
            '--include-data-dir=src=src',
            'main.py'
        ]

        print('Starting Nuitka build...')
        result = subprocess.run(cmd, cwd=project_root, capture_output=True, text=True)

        if result.returncode == 0:
            print('Nuitka build completed successfully')

            # 重命名输出目录
            main_dist = dist_dir / 'main.dist'
            target_dir = dist_dir / 'Nmodm_nuitka_standalone'
            if main_dist.exists() and not target_dir.exists():
                main_dist.rename(target_dir)
                print('Output directory renamed to Nmodm_nuitka_standalone')
        else:
            print('Nuitka build failed:')
            print(result.stderr)
            sys.exit(1)
        "

    - name: 创建发布包
      run: |
        New-Item -ItemType Directory -Force -Path "release"

        # 查找 Nuitka 构建输出目录
        $nuitkaDir = $null
        if (Test-Path "Builds/Nuitka/Nmodm_nuitka_standalone") {
          $nuitkaDir = "Builds/Nuitka/Nmodm_nuitka_standalone"
        } elseif (Test-Path "Builds/Nuitka/main.dist") {
          $nuitkaDir = "Builds/Nuitka/main.dist"
        }

        if ($nuitkaDir) {
          Write-Host "Found Nuitka build directory: $nuitkaDir"
          Compress-Archive -Path "$nuitkaDir/*" -DestinationPath "release/Nmodm-v${{ github.event.inputs.version }}.zip"
          Write-Host "Main release package created: Nmodm-v${{ github.event.inputs.version }}.zip"
        } else {
          Write-Host "Nuitka build output not found"
          Get-ChildItem "Builds" -Recurse | Write-Host
          exit 1
        }

        # 创建源代码包
        $sourceFiles = @("src", "OnlineFix", "main.py", "requirements.txt", "README.md", "LICENSE", "build_manager.py", "install_dependencies.py")
        $existingFiles = @()
        foreach ($file in $sourceFiles) {
          if (Test-Path $file) {
            $existingFiles += $file
          }
        }
        if ($existingFiles.Count -gt 0) {
          Compress-Archive -Path $existingFiles -DestinationPath "release/Nmodm-Source-v${{ github.event.inputs.version }}.zip"
          Write-Host "Source code package created: Nmodm-Source-v${{ github.event.inputs.version }}.zip"
        }

    - name: 创建 Inno Setup 脚本
      run: |
        # 动态创建 Inno Setup 脚本
        $version = "${{ github.event.inputs.version }}".TrimStart('v')
        $issContent = @"
        [Setup]
        AppName=Nmodm
        AppVersion=$version
        AppPublisher=QykXczj
        DefaultDirName={autopf}\Nmodm
        DefaultGroupName=Nmodm
        OutputDir=release
        OutputBaseFilename=Nmodm-v$version-Setup
        Compression=lzma2
        SolidCompression=yes
        UninstallDisplayName=Nmodm v$version
        UninstallDisplayIcon={app}\Nmodm.exe
        CreateUninstallRegKey=yes
        MinVersion=6.1sp1
        ArchitecturesAllowed=x64
        ArchitecturesInstallIn64BitMode=x64

        [Files]
        Source: "$nuitkaDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\Nmodm"; Filename: "{app}\Nmodm.exe"
        Name: "{autodesktop}\Nmodm"; Filename: "{app}\Nmodm.exe"; Tasks: desktopicon

        [Tasks]
        Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "附加图标:"; Flags: unchecked

        [Run]
        Filename: "{app}\Nmodm.exe"; Description: "启动 Nmodm"; Flags: nowait postinstall skipifsilent

        [Messages]
        WelcomeLabel1=欢迎使用 Nmodm 安装向导
        WelcomeLabel2=这将在您的计算机上安装 Nmodm v$version
        "@
        $issContent | Out-File -FilePath "setup.iss" -Encoding UTF8
        Write-Host "✅ Inno Setup 脚本已创建"

    - name: 构建 Windows 安装包
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: setup.iss
        options: /O+ /Q

    - name: 移动安装包到发布目录
      run: |
        if (Test-Path "Output") {
          Move-Item "Output\*.exe" "release\"
          Write-Host "✅ 安装包已移动到发布目录"
          Get-ChildItem "release" | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "❌ 安装包生成失败"
        }
        
    - name: 创建发行版
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Nmodm ${{ github.event.inputs.version }}
        body: |
          # Nmodm ${{ github.event.inputs.version }} Release

          ## New Version Release

          This is Nmodm - Modern ME3 Mod Manager version ${{ github.event.inputs.version }}.

          ## Download Options

          ### Windows 安装包 (推荐)
          - **Nmodm-v${{ github.event.inputs.version }}-Setup.exe** - Windows 安装程序，一键安装，自动创建快捷方式

          ### 便携版
          - **Nmodm-v${{ github.event.inputs.version }}.zip** - Nuitka 目录构建版，高性能，解压即用

          ### 开发者版本
          - **Nmodm-Source-v${{ github.event.inputs.version }}.zip** - 源代码包，需要 Python 环境

          ## Main Features

          - Modern frameless GUI interface
          - Intelligent Mod management system
          - Complete ME3 configuration and launch
          - Multi-mirror download support
          - Mod annotation and classification
          - External Mod support
          - Multi-theme interface

          ## System Requirements

          - Windows 10/11 (64-bit)
          - Elden Ring Nightreign game

          ## Usage Instructions

          ### Windows 安装包 (推荐)
          1. 下载 `Nmodm-v${{ github.event.inputs.version }}-Setup.exe`
          2. 以管理员身份运行安装程序
          3. 按照安装向导完成安装
          4. 从开始菜单或桌面快捷方式启动 Nmodm
          5. 按照应用内指南配置游戏路径和模组

          ### 便携版
          1. 下载 `Nmodm-v${{ github.event.inputs.version }}.zip`
          2. 解压到任意目录
          3. 运行 `Nmodm.exe`
          4. 按照应用内指南配置游戏路径和模组

          ### 源代码版本
          1. 下载并解压源代码包
          2. 安装 Python 3.11+
          3. 运行 `python install_dependencies.py`
          4. 运行 `python main.py`

          ## Important Notes

          - Please backup game saves before use
          - Some antivirus software may report false positives, please add to trust list
          - Ensure you own a legal copy of the game

          ## Bug Reports

          If you encounter issues, please report them on the [Issues](https://github.com/QykXczj/Nmodm/issues) page.

          ## Acknowledgments

          Thanks to all users for their support and feedback!
        draft: ${{ github.event.inputs.draft }}
        prerelease: ${{ github.event.inputs.prerelease }}
        files: |
          release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
