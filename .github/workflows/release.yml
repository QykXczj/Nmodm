name: 创建发行版

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发行版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: '是否为预发布版本'
        required: false
        default: false
        type: boolean
      draft:
        description: '是否为草稿版本'
        required: false
        default: false
        type: boolean

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: 创建必要目录
      run: |
        mkdir -p OnlineFix
        mkdir -p Mods
        echo "OnlineFix64.dll" > OnlineFix/dlllist.txt

    - name: 使用 Nuitka 打包 (目录版)
      run: |
        # 创建简化的构建脚本避免编码问题
        python -c "
        import sys
        import os
        import subprocess
        import shutil
        from pathlib import Path

        # 设置环境变量避免编码问题
        os.environ['PYTHONIOENCODING'] = 'utf-8'

        # 简化的 Nuitka 构建
        project_root = Path('.')
        builds_dir = project_root / 'Builds'
        dist_dir = builds_dir / 'Nuitka'

        # 确保目录存在
        builds_dir.mkdir(exist_ok=True)
        dist_dir.mkdir(exist_ok=True)

        # 清理旧文件
        if dist_dir.exists():
            shutil.rmtree(dist_dir)
            dist_dir.mkdir(exist_ok=True)

        # Nuitka 命令
        cmd = [
            sys.executable, '-m', 'nuitka',
            '--assume-yes-for-downloads',
            '--enable-plugin=pyside6',
            '--disable-console',
            '--standalone',
            '--output-dir=' + str(dist_dir),
            '--output-filename=Nmodm_nuitka_standalone',
            '--include-data-file=zwnr.png=zwnr.png',
            '--include-data-dir=OnlineFix=OnlineFix',
            '--include-data-dir=src=src',
            'main.py'
        ]

        print('Starting Nuitka build...')
        result = subprocess.run(cmd, cwd=project_root, capture_output=True, text=True)

        if result.returncode == 0:
            print('Nuitka build completed successfully')

            # 重命名输出目录
            main_dist = dist_dir / 'main.dist'
            target_dir = dist_dir / 'Nmodm_nuitka_standalone'
            if main_dist.exists() and not target_dir.exists():
                main_dist.rename(target_dir)
                print('Output directory renamed to Nmodm_nuitka_standalone')
        else:
            print('Nuitka build failed:')
            print(result.stderr)
            sys.exit(1)
        "

    - name: 创建发布包
      run: |
        mkdir -p release

        # 查找 Nuitka 构建输出目录
        if [ -d "Builds/Nuitka/Nmodm_nuitka_standalone" ]; then
          nuitkaDir="Builds/Nuitka/Nmodm_nuitka_standalone"
        elif [ -d "Builds/Nuitka/main.dist" ]; then
          nuitkaDir="Builds/Nuitka/main.dist"
        else
          nuitkaDir=""
        fi

        if [ -n "$nuitkaDir" ]; then
          echo "Found Nuitka build directory: $nuitkaDir"
          cd "$nuitkaDir" && zip -r "../../release/Nmodm-v${{ github.event.inputs.version }}.zip" . && cd -
          echo "Main release package created: Nmodm-v${{ github.event.inputs.version }}.zip"
        else
          echo "Nuitka build output not found"
          find Builds -type f -ls
          exit 1
        fi

        # 创建源代码包
        sourceFiles="src OnlineFix main.py requirements.txt README.md LICENSE build_manager.py install_dependencies.py"
        existingFiles=""
        for file in $sourceFiles; do
          if [ -e "$file" ]; then
            existingFiles="$existingFiles $file"
          fi
        done

        if [ -n "$existingFiles" ]; then
          zip -r "release/Nmodm-Source-v${{ github.event.inputs.version }}.zip" $existingFiles
          echo "Source code package created: Nmodm-Source-v${{ github.event.inputs.version }}.zip"
        fi
        
    - name: 创建发行版
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Nmodm ${{ github.event.inputs.version }}
        body: |
          # Nmodm ${{ github.event.inputs.version }} 发行版

          ## 🎉 新版本发布

          这是 Nmodm - Modern ME3 Mod Manager 的 ${{ github.event.inputs.version }} 版本。

          ## 📦 下载选项

          ### 主要版本 (推荐)
          - **Nmodm-v${{ github.event.inputs.version }}.zip** - Nuitka 目录版本，高性能优化

          ### 开发者版本
          - **Nmodm-Source-v${{ github.event.inputs.version }}.zip** - 源代码包，需要 Python 环境

          ## 🚀 主要功能

          - ✨ 现代化无边框 GUI 界面
          - 📦 智能 Mod 管理系统
          - 🔧 完整的 ME3 配置和启动
          - 🌐 多镜像下载支持
          - 🏷️ Mod 备注和分类功能
          - 💾 外部 Mod 支持
          - 🎨 多主题界面

          ## 📋 系统要求

          - Windows 10/11 (64位)
          - 《艾尔登法环：夜之王朝》游戏

          ## 🔧 使用方法

          ### 主要版本
          1. 下载 `Nmodm-v${{ github.event.inputs.version }}.zip`
          2. 解压到任意目录
          3. 运行 `Nmodm.exe`
          4. 按照软件内指引配置游戏路径和 Mod

          ### 源代码版本
          1. 下载并解压源代码包
          2. 安装 Python 3.11+
          3. 运行 `python install_dependencies.py`
          4. 运行 `python main.py`

          ## ⚠️ 重要提示

          - 使用前请备份游戏存档
          - 部分杀毒软件可能误报，请添加信任
          - 确保拥有游戏的合法副本

          ## 🐛 问题反馈

          如果遇到问题，请在 [Issues](https://github.com/QykXczj/Nmodm/issues) 页面反馈。

          ## 🙏 致谢

          感谢所有用户的支持和反馈！
        draft: ${{ github.event.inputs.draft }}
        prerelease: ${{ github.event.inputs.prerelease }}
        files: |
          release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
